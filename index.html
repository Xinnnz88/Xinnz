<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xinnz Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #07050f;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Background glow */
        body::before {
            content: '';
            position: fixed;
            width: 400px; height: 400px;
            background: radial-gradient(circle, #4166fa22 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            color: #4166fa;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .sub {
            font-size: 0.85rem;
            color: #555580;
            margin-bottom: 48px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .card {
            background: #0e0c20;
            border: 1px solid #1e1a40;
            border-radius: 16px;
            padding: 32px 40px;
            text-align: center;
            width: 320px;
        }

        .discord-icon {
            font-size: 2.5rem;
            margin-bottom: 14px;
        }

        .card h2 {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .card p {
            font-size: 0.78rem;
            color: #555;
            margin-bottom: 24px;
        }

        /* Progress bar */
        .bar-bg {
            background: #1a1640;
            border-radius: 99px;
            height: 4px;
            width: 100%;
            overflow: hidden;
            margin-bottom: 14px;
        }
        .bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4166fa, #6e8fff);
            border-radius: 99px;
            transition: width 0.05s linear;
        }

        .timer {
            font-size: 0.75rem;
            color: #4166fa;
        }
    </style>
</head>
<body>

    <div class="logo">◆ Xinnz Hub</div>
    <div class="sub">Protected Script</div>

    <div class="card">
        <div class="discord-icon">🔗</div>
        <h2>Redirecting to Discord...</h2>
        <p>Joining the Xinnz Hub community</p>
        <div class="bar-bg">
            <div class="bar-fill" id="bar"></div>
        </div>
        <div class="timer" id="timer">3s</div>
    </div>

    <script>
        // ── Ganti link Discord kamu di sini ──
        const DISCORD = "https://discord.gg/XXXXXXX"
        // ─────────────────────────────────────

        const bar   = document.getElementById("bar")
        const timer = document.getElementById("timer")
        const total = 3000  // ms
        const step  = 30
        let elapsed = 0

        const iv = setInterval(() => {
            elapsed += step
            const pct = Math.min((elapsed / total) * 100, 100)
            bar.style.width = pct + "%"
            const sec = Math.ceil((total - elapsed) / 1000)
            timer.textContent = sec > 0 ? sec + "s" : "Redirecting..."
            if (elapsed >= total) {
                clearInterval(iv)
                window.location.href = DISCORD
            }
        }, step)
    </script>

</body>
</html>
